{% extends 'base.html' %}

{% block content %}

<div class="flex items-center justify-center min-h-screen">
    <div class="glass p-8 w-full max-w-md">

        <h2 class="text-2xl font-semibold mb-6 text-center">Login</h2>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <input type="text" name="username" placeholder="Username"
                class="w-full bg-black/30 border border-gray-600 text-white p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">

            <input type="password" name="password" placeholder="Password"
                class="w-full bg-black/30 border border-gray-600 text-white p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">

            <button class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg transition">
                Login
            </button>
        </form>

    </div>
</div>

{% endblock %}
