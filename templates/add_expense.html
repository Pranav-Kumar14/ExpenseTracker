{% extends 'base.html' %}

{% block content %}

<div class="max-w-xl mx-auto glass p-8">
    <h2 class="text-2xl mb-6">Add Expense</h2>

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}

        <button class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg">
            Save Expense
        </button>
    </form>
</div>

{% endblock %}
