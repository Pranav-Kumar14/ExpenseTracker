{% extends 'base.html' %} {% block content %}

<div class="flex items-center justify-center min-h-screen">
  <div class="glass p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-center mb-2">Expense Tracker</h1>
    <p class="text-gray-400 text-center mb-6 text-sm">Create your account</p>

    <form method="POST" class="space-y-4">
      {% csrf_token %}

      <input
        type="text"
        name="username"
        placeholder="Username"
        class="w-full bg-black/30 border border-gray-600 text-white p-3 rounded-lg"
      />

      <input
        type="email"
        name="email"
        placeholder="Email"
        class="w-full bg-black/30 border border-gray-600 text-white p-3 rounded-lg"
      />

      <input
        type="password"
        name="password1"
        placeholder="Password"
        class="w-full bg-black/30 border border-gray-600 text-white p-3 rounded-lg"
      />

      <input
        type="password"
        name="password2"
        placeholder="Confirm Password"
        class="w-full bg-black/30 border border-gray-600 text-white p-3 rounded-lg"
      />

      <button class="w-full bg-purple-600 hover:bg-purple-700 py-3 rounded-lg">
        Sign Up
      </button>
    </form>

    {% if form.errors %}
    <div class="bg-red-500/20 text-red-300 p-3 rounded mb-4 text-sm">
      {{ form.errors }}
    </div>
    {% endif %}
    <p class="text-center text-gray-400 text-sm mt-4">
      Already have an account?
      <a href="/accounts/login/" class="text-purple-400 hover:underline"
        >Login</a
      >
    </p>
  </div>
</div>

{% endblock %}
